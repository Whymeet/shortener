# nginx server-блок для коротких доменов (мультидомен — все в одном блоке).
# Положить на сервер в /etc/nginx/conf.d/ (или sites-available + симлинк), затем выпустить
# общий SAN-сертификат на все домены:
#   certbot --nginx -d go.kybyshka-dev.ru -d krokozaim.ru -d nashzaim.ru
# Добавить домен позже: дописать в server_name ниже + ALLOWED_DOMAINS в .env, затем
#   certbot --nginx --expand -d <все домены, включая новый>
#
# Каждый домен из server_name должен иметь A-запись на этот сервер ДО запуска certbot.
# default_server НЕ ставим: чужой Host уйдёт в дефолтный vhost, а не в наш сервис.

server {
    listen 80;
    server_name go.kybyshka-dev.ru krokozaim.ru nashzaim.ru;

    # certbot сам допишет 443/redirect при выпуске сертификата
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
