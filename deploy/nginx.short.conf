# nginx server-блок для короткого домена.
# Положить на сервер в /etc/nginx/conf.d/ (или sites-available + симлинк),
# затем получить TLS: certbot --nginx -d go.kybyshka-dev.ru
#
# A/CNAME запись go.kybyshka-dev.ru должна указывать на этот сервер.

server {
    listen 80;
    server_name go.kybyshka-dev.ru;

    # certbot сам допишет 443/redirect при выпуске сертификата
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
